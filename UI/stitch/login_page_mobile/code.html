<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Neon Auditor - Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#ffffff",
              "primary": "#b40066",
              "surface-tint": "#b80069",
              "on-surface-variant": "#594048",
              "surface-container-highest": "#dce1ff",
              "on-secondary-fixed-variant": "#32476d",
              "surface-dim": "#d1d8ff",
              "outline-variant": "#e0bec7",
              "surface-container": "#ebedff",
              "on-tertiary-container": "#f6fff5",
              "on-background": "#0e193d",
              "on-tertiary-fixed": "#002110",
              "primary-fixed-dim": "#ffb0cb",
              "surface-container-low": "#f3f2ff",
              "on-tertiary": "#ffffff",
              "surface-container-high": "#e4e7ff",
              "on-secondary-container": "#43587f",
              "tertiary-fixed": "#57ffa6",
              "inverse-surface": "#242e53",
              "tertiary-fixed-dim": "#17e28a",
              "surface-variant": "#dce1ff",
              "tertiary-container": "#00864f",
              "on-secondary-fixed": "#011b3f",
              "surface": "#faf8ff",
              "on-tertiary-fixed-variant": "#00522e",
              "secondary-container": "#bacffd",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#8d004f",
              "inverse-primary": "#ffb0cb",
              "on-error-container": "#93000a",
              "secondary": "#4a5e86",
              "primary-fixed": "#ffd9e3",
              "on-primary-fixed": "#3e001f",
              "on-error": "#ffffff",
              "inverse-on-surface": "#eff0ff",
              "error-container": "#ffdad6",
              "primary-container": "#da2180",
              "secondary-fixed-dim": "#b2c7f4",
              "on-surface": "#0e193d",
              "error": "#ba1a1a",
              "secondary-fixed": "#d7e2ff",
              "background": "#faf8ff",
              "surface-bright": "#faf8ff",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#fffbff",
              "outline": "#8d6f78",
              "tertiary": "#006a3d"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-vibrant-gradient {
            background: linear-gradient(135deg, #F23892 0%, #7B1FA2 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center antialiased">
<!-- Background Decoration -->
<div class="fixed inset-0 bg-vibrant-gradient z-0"></div>
<div class="fixed inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10 z-0"></div>
<main class="relative z-10 w-full max-w-[375px] px-6 py-8">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary-container flex items-center justify-center rounded-2xl shadow-xl mb-4">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="emoji_events" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
</div>
<h1 class="font-headline font-black text-white text-3xl tracking-tight leading-none text-center">
                The Neon Auditor
            </h1>
<p class="font-label text-white/80 text-[10px] tracking-[0.15em] mt-2 uppercase">
                Luzon, Philippines • Official
            </p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-lg p-8 shadow-2xl border border-white/20">
<div class="mb-8">
<h2 class="font-headline font-bold text-2xl text-on-surface tracking-tight">Welcome Back</h2>
<p class="font-body text-sm text-on-surface-variant">Sign in to access your dashboard</p>
</div>
<form class="space-y-5">
<!-- Username/Email -->
<div class="space-y-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant tracking-wider ml-1" for="email">OPERATOR ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="person">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-DEFAULT text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="email" placeholder="username@luzon.ev" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-1.5">
<div class="flex justify-between items-center ml-1">
<label class="font-label text-xs font-semibold text-on-surface-variant tracking-wider" for="password">ACCESS KEY</label>
<a class="text-xs text-primary font-medium hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-surface-container-low border-none rounded-DEFAULT text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2 pt-1">
<input class="w-5 h-5 rounded border-none bg-surface-container-low text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium select-none" for="remember">Stay signed in for 24h</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 px-6 rounded-full font-headline font-bold text-lg shadow-lg shadow-primary/30 active:scale-95 transition-all duration-150 flex items-center justify-center gap-3 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-8 pt-6 border-t border-outline-variant/15 flex flex-col items-center gap-4">
<button class="w-full bg-surface-container-highest text-on-secondary-container py-3 px-6 rounded-full font-label font-bold text-xs tracking-widest flex items-center justify-center gap-2 transition-colors hover:bg-surface-container-high">
<span class="material-symbols-outlined text-lg" data-icon="fingerprint">fingerprint</span>
                    BIOMETRIC LOGIN
                </button>
</div>
</div>
<!-- Footer -->
<footer class="mt-8 flex flex-col items-center gap-4">
<div class="flex gap-6">
<a class="text-white/60 hover:text-white text-xs font-medium transition-colors" href="#">Help Center</a>
<a class="text-white/60 hover:text-white text-xs font-medium transition-colors" href="#">System Status</a>
<a class="text-white/60 hover:text-white text-xs font-medium transition-colors" href="#">Legal</a>
</div>
<p class="text-[10px] text-white/40 font-medium tracking-widest">v2.4.0 ENCRYPTED BY LUMINA TECH</p>
</footer>
</main>
<!-- Visual Accents (Blurred Orbs) -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#da2180] rounded-full blur-[120px] opacity-20 pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#7B1FA2] rounded-full blur-[120px] opacity-20 pointer-events-none z-0"></div>
</body></html>
